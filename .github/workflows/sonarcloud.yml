name: SonarCloud Analysis
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0
    - name: Set up JDK 17
      uses: actions/setup-java@v1
      with:
        java-version: 17
    - name: Build with Maven
      run: cd microservice-demo && ./mvnw -B package -DskipTests --file pom.xml
    - name: SonarCloud Scan
      run: cd microservice-demo && ./mvnw sonar:sonar -Dsonar.projectKey=hrishi-mane_microservice -Dsonar.organization=hrishi-mane -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=${{ secrets.SONAR_TOKEN }}
